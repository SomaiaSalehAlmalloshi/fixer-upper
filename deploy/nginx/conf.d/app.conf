# HTTP -> HTTPS redirect. ACME challenges kept on port 80.
server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
  location / { return 301 https://$host$request_uri; }
}

# Primary TLS vhost. Replace server_name and cert paths for production.
server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # ---- Security headers ----
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "DENY" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
  # Tighten CSP once you catalogue third-party origins actually used at runtime.
  add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; font-src 'self' data: https:; frame-ancestors 'none'" always;

  # ---- Rate limits ----
  limit_conn conn 100;
  limit_req  zone=api burst=60 nodelay;

  # ---- Static assets (long cache) ----
  location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
    proxy_pass http://tanstack_app;
    proxy_cache_valid 200 1d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # ---- App (SSR + server functions + api routes) ----
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_pass http://tanstack_app;
  }
}
