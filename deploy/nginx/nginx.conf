user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ---- Logging (JSON, easy to ship to Loki/CloudWatch) ----
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"referer":"$http_referer",'
      '"ua":"$http_user_agent",'
      '"rt":$request_time,'
      '"urt":"$upstream_response_time",'
      '"host":"$host",'
      '"req_id":"$request_id"'
    '}';
  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 20m;
  types_hash_max_size 2048;

  # ---- Compression ----
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml application/rss+xml image/svg+xml
             application/wasm;

  # ---- Rate limiting ----
  limit_req_zone  $binary_remote_addr zone=api:10m rate=30r/s;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # ---- Upstream: docker-compose service "app" replicas ----
  upstream tanstack_app {
    least_conn;
    server app:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  include /etc/nginx/conf.d/*.conf;
}
