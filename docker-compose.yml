services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: risk-platform:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/public/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks: [edge]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks: [edge]

  # Optional log shipper — enable with `--profile observability`
  loki:
    profiles: ["observability"]
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki
    networks: [edge]

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:2.9.8
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/observability/promtail.yaml:/etc/promtail/config.yaml:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    networks: [edge]

  # Postgres backup sidecar for self-hosted Supabase. Skip if using Lovable Cloud.
  backup:
    profiles: ["backup"]
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - ./deploy/scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backups:/backups
    entrypoint: ["/bin/sh", "-c", "crond -f -l 8 & echo '0 */6 * * * /usr/local/bin/backup.sh' | crontab - && wait"]

volumes:
  nginx_cache:
  nginx_logs:
  loki_data:
  backups:

networks:
  edge:
    driver: bridge
