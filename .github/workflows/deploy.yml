name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  deploy:
    name: Deploy ${{ github.event.inputs.environment || 'staging' }}
    needs: image
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      # ---- Option A: Lovable-managed publish (default hosting) ----
      # Frontend + edge worker changes go live via the Lovable Publish button
      # or Lovable API. Backend changes (migrations, server fns) deploy
      # immediately. Nothing else to do here for Lovable Cloud users.

      # ---- Option B: Self-hosted docker host (uncomment and configure) ----
      # - name: SSH deploy
      #   uses: appleboy/ssh-action@v1.2.0
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       cd /srv/risk-platform
      #       echo "IMAGE=${{ env.IMAGE }}:${{ needs.image.outputs.tag }}" > .env.image
      #       docker compose pull app
      #       docker compose up -d --no-deps --scale app=2 app
      #       docker image prune -f

      - name: Smoke test
        run: |
          URL="${{ secrets.SMOKE_URL }}"
          if [ -n "$URL" ]; then
            for i in 1 2 3 4 5; do
              curl -fsS "$URL/api/public/health" && exit 0 || sleep 5
            done
            exit 1
          fi
